name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign binary
        run: |
          codesign --force --options runtime \
            --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            --identifier "com.areadenial.vibe-idler" \
            --timestamp \
            target/${{ matrix.target }}/release/vibe-idler

          codesign -dv target/${{ matrix.target }}/release/vibe-idler 2>&1

      - name: Package with assets
        run: |
          mkdir -p release-pkg/vibe-idler
          cp target/${{ matrix.target }}/release/vibe-idler release-pkg/vibe-idler/
          cp -R assets release-pkg/vibe-idler/
          find release-pkg -name ".DS_Store" -delete
          cd release-pkg && zip -r ../vibe-idler-macos-${{ matrix.arch }}.zip vibe-idler/

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit vibe-idler-macos-${{ matrix.arch }}.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-idler-macos-${{ matrix.arch }}
          path: vibe-idler-macos-${{ matrix.arch }}.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Build release binary
        run: cargo build --release

      - name: Package with assets
        run: |
          mkdir -p release-pkg/vibe-idler
          cp target/release/vibe-idler release-pkg/vibe-idler/
          cp -R assets release-pkg/vibe-idler/
          find release-pkg -name ".DS_Store" -delete
          cd release-pkg && tar czf ../vibe-idler-linux-x86_64.tar.gz vibe-idler/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-idler-linux-x86_64
          path: vibe-idler-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package with assets
        shell: bash
        run: |
          mkdir -p release-pkg/vibe-idler
          cp target/release/vibe-idler.exe release-pkg/vibe-idler/
          cp -R assets release-pkg/vibe-idler/
          find release-pkg -name ".DS_Store" -delete
          cd release-pkg && 7z a ../vibe-idler-windows.zip vibe-idler/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-idler-windows
          path: vibe-idler-windows.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vibe-idler-*.zip
            vibe-idler-*.tar.gz
